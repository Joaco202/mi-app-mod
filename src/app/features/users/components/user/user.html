<cdk-virtual-scroll-viewport itemSize="100">

  <li *cdkVirtualFor="let p of data;" class="animated lightSpeedIn item-wrap" >
    <div class="thumbnail-wrap">
      <img src="{{ p.avatar }}">
    </div>
    <div class="info-wrap">
      <h4>{{ p.name }}</h4>
      <h6>{{ p.email }}</h6>
    </div>
  </li>

</cdk-virtual-scroll-viewport>
