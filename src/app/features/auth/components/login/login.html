<div class="container my-5">
  <div class="omb_login">
    <h3 class="omb_authTitle text-center mb-4">Ingresar o <a href="#" class="text-primary text-decoration-none">Registrarse</a></h3>

    <div class="row justify-content-center my-4 omb_socialButtons">
      <div class="col-12 col-md-9">
        <div class="row g-3 justify-content-center align-items-center">
          <div class="col-4">
            <a href="#" class="btn text-white d-flex align-items-center justify-content-center w-100" style="background-color: #4f689e; border-radius: 4px; font-size: 14px; height: 40px; border: none; font-weight: 500;">
              <i class="bi bi-facebook fs-5 me-2"></i>
              <span>Facebook</span>
            </a>
          </div>
          <div class="col-4">
            <a href="#" class="btn text-white d-flex align-items-center justify-content-center w-100" style="background-color: #5eaade; border-radius: 4px; font-size: 14px; height: 40px; border: none; font-weight: 500;">
              <i class="bi bi-twitter fs-5 me-2"></i>
              <span>Twitter</span>
            </a>
          </div>
          <div class="col-4 d-flex justify-content-start">
            <asl-google-signin-button type="standard" size="large"></asl-google-signin-button>
          </div>
        </div>
      </div>
    </div>

    <div class="row justify-content-center my-4">
      <div class="col-12 col-md-9 text-center position-relative">
        <hr>
        <span class="position-absolute translate-middle bg-white px-3 text-muted fs-5" style="top: 50%; left: 50%;">o</span>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-12">
        <form class="omb_loginForm" [formGroup]="loginForm" (ngSubmit)="login()" autocomplete="off">
          <div class="input-group mb-3">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-fill text-muted">&nbsp;</i></span>
            <input formControlName="email" type="text" class="form-control border-start-0 py-2" placeholder="Email">
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted">&nbsp;</i></span>
            <input formControlName="password" type="password" class="form-control border-start-0 py-2" placeholder="Password">
          </div>

          <button class="btn btn-lg btn-primary w-100 py-2 mt-3" type="submit" style="background-color: #0d6efd; border-radius: 8px; font-weight: 500;">Login</button>

          <div class="d-flex justify-content-between align-items-center mt-3" style="font-size: 14px;">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label text-dark" for="rememberMe">
                Recuérdame
              </label>
            </div>
            <a href="#" class="text-decoration-none" style="color: #0d6efd;">Olvidaste tu password?</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
